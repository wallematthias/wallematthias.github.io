# site properties and page defaults
title: Matthias Walle
subtitle: Postdoctoral associate in bone imaging, AI, and scientific software
description: Personal website for Matthias Walle, focused on computational imaging, bone analysis, and research software with room to grow into a future lab site.
header: images/background.png
footer: images/background.png
header-dark: false
footer-dark: false
proofer: false

# site social media and other links
links:
  email: matthias.walle@ucalgary.ca
  orcid: 0000-0003-3250-8143
  github: wallematthias

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
