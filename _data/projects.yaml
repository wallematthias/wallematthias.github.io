- title: MotionScoreCNN
  subtitle: Deep-learning motion scoring for HR-pQCT
  link: https://github.com/wallematthias/MotionScoreCNN
  description: A command-line tool for automated and semi-manual motion grading of HR-pQCT scans using an ensemble of deep convolutional neural networks and visual diagnostics.
  repo: wallematthias/MotionScoreCNN
  tags:
    - hr-pqct
    - deep-learning
    - quality-control

- title: BoneQuantMRI
  subtitle: MATLAB bone MRI analysis tool
  link: https://github.com/wallematthias/BoneQuantMRI
  description: A MATLAB tool for analyzing bone MRI images with ROI-based segmentation, phantom calibration, visualization, and export workflows for quantitative image analysis.
  repo: wallematthias/BoneQuantMRI
  tags:
    - mri
    - matlab
    - quantitative-imaging

- title: ImageGuidedStrain
  subtitle: Registration-based strain estimation
  link: https://github.com/wallematthias/ImageGuidedStrain
  description: A project for multi-resolution Demons registration on 3D images and von Mises strain estimation, following the strain-analysis approach described by Zwahlen et al.
  repo: wallematthias/ImageGuidedStrain
  tags:
    - registration
    - strain
